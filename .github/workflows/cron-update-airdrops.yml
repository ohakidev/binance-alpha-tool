# GitHub Actions Cron Job for Airdrop Updates
# Runs every 5 minutes to sync data from Binance Alpha API
# Free alternative to Vercel Pro cron jobs

name: Update Airdrops Cron

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update-airdrops:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Validate cron configuration
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "❌ CRON_SECRET is not configured in repository secrets."
            exit 1
          fi

          # Default to production URL if APP_URL not set
          URL="${APP_URL:-https://binance-alpha-tool-chi.vercel.app}"
          URL="${URL%/}"

          echo "CRON_URL=${URL}/api/cron/update-airdrops" >> "$GITHUB_ENV"

      - name: Trigger Airdrop Update
        shell: bash
        run: |
          set -euo pipefail

          echo "🚀 Triggering airdrop update..."
          echo "URL: ${CRON_URL}"

          # Send both header and query auth. Query auth survives cross-host redirects,
          # which avoids losing Authorization on canonical domain redirects.
          if ! HTTP_CODE=$(curl -sS --location -o response.json -w "%{http_code}" \
            --max-time 120 \
            --get \
            --data-urlencode "secret=${CRON_SECRET}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${CRON_URL}"); then
            echo ""
            echo "❌ Failed to reach cron endpoint."
            exit 1
          fi

          echo "📊 Response (HTTP ${HTTP_CODE}):"
          head -c 1000 response.json || true

          # Check if request was successful
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo ""
            echo "✅ Airdrop update completed successfully!"
          else
            echo ""
            echo "❌ Airdrop update failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Report Status
        if: failure()
        run: |
          echo "⚠️ Cron job failed. Check the logs above for details."
          echo "Common issues:"
          echo "  - CRON_SECRET not set in repository secrets"
          echo "  - APP_URL incorrect or app not deployed"
          echo "  - API endpoint timeout or error"
